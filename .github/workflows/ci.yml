name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build + unit tests ────────────────────────────────────────────
  test-unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest websockets httpx pydantic numpy msgpack

      - name: cargo test (Rust compile check)
        run: cargo test

      - name: Build (release)
        run: |
          source .venv/bin/activate
          maturin develop --release

      - name: Run pytest (unit)
        run: |
          source .venv/bin/activate
          pytest tests/test_mcp.py tests/test_cookies_unit.py tests/test_testclient.py tests/test_async_isolation.py tests/test_logging.py -v

  # ── Integration tests ─────────────────────────────────────────────
  test-integration:
    name: Integration tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: test-unit
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest websockets httpx pydantic numpy msgpack

      - name: Build (release)
        run: |
          source .venv/bin/activate
          maturin develop --release

      - name: Integration — all features (GIL + sub-interp)
        run: |
          source .venv/bin/activate
          python tests/test_all_features.py

  # ── Rust lint (advisory, non-blocking) ────────────────────────────
  rust-lint:
    name: Rust lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --check || echo "::warning::cargo fmt found formatting issues"
      - name: cargo clippy
        run: cargo clippy --all-targets 2>&1 || echo "::warning::clippy found warnings"
